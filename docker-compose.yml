# Local Development Docker Compose
# Usage: docker-compose up -d

version: "3.9"

services:
  # ==================== Backend API ====================
  backend:
    build:
      context: .
      dockerfile: deploy/docker/Dockerfile.backend
    container_name: honeypot-backend
    ports:
      - "8000:8000"
    environment:
      - DB_URL=sqlite:///./data/honeypot.db
      - JWT_SECRET=dev-secret-change-in-production
      - ENVIRONMENT=development
      - DEBUG=true
    volumes:
      - ./:/app
      - honeypot-data:/app/data
    networks:
      - honeypot-network

  # ==================== Frontend ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: ../deploy/docker/Dockerfile.frontend
    container_name: honeypot-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    networks:
      - honeypot-network

  # ==================== SSH Honeypot (Cowrie) ====================
  cowrie-ssh:
    image: cowrie/cowrie:latest
    container_name: honeypot-cowrie-ssh
    ports:
      - "2222:2222"   # SSH
      - "2323:2323"   # Telnet
    volumes:
      - cowrie-data:/cowrie/data
      - cowrie-log:/cowrie/var/log/cowrie
      - cowrie-dl:/cowrie/dl
    networks:
      - honeypot-network
    restart: unless-stopped

  # ==================== FTP Honeypot ====================
  ftp-honeypot:
    image: stilliard/pure-ftpd:latest
    container_name: honeypot-ftp
    ports:
      - "2121:21"
      - "30000-30009:30000-30009"
    environment:
      - PUBLICHOST=0.0.0.0
      - ADDED_FLAGS=--createhomedir --keepallfiles
    volumes:
      - ftp-data:/home/ftpusers
      - ftp-log:/var/log/pure-ftpd
    networks:
      - honeypot-network
    restart: unless-stopped

  # ==================== HTTP Honeypot ====================
  http-honeypot:
    image: nginx:alpine
    container_name: honeypot-http
    ports:
      - "8080:80"
    volumes:
      - http-log:/var/log/nginx
    networks:
      - honeypot-network
    restart: unless-stopped

networks:
  honeypot-network:
    driver: bridge

volumes:
  honeypot-data:
  cowrie-data:
  cowrie-log:
  cowrie-dl:
  ftp-data:
  ftp-log:
  http-log: