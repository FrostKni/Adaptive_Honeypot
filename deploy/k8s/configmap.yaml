# ConfigMaps for Adaptive Honeypot System
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: honeypot-config
  namespace: honeypot
  labels:
    app.kubernetes.io/name: adaptive-honeypot
    app.kubernetes.io/component: config
data:
  # Application settings
  APP_NAME: "Adaptive Honeypot System"
  ENVIRONMENT: "production"
  DEBUG: "false"
  LOG_LEVEL: "INFO"
  
  # Backend settings
  PORT: "8000"
  WORKERS: "4"
  
  # Database settings
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "adaptive_honeypot"
  DB_POOL_SIZE: "20"
  DB_MAX_OVERFLOW: "40"
  
  # Redis settings
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  
  # Honeypot settings
  HONEYPOT_NETWORK: "honeypot-net"
  HONEYPOT_SUBNET: "172.28.0.0/16"
  
  # AI/ML settings
  AI_PROVIDER: "openai"
  AI_MODEL: "gpt-4"
  AI_TEMPERATURE: "0.3"
  AI_MAX_TOKENS: "2000"
  
  # Security settings
  CORS_ORIGINS: '["https://honeypot.example.com"]'
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW: "60"
  
  # Monitoring settings
  METRICS_ENABLED: "true"
  TRACING_ENABLED: "true"
  TRACING_SAMPLE_RATE: "0.1"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: honeypot
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
data:
  POSTGRES_DB: "adaptive_honeypot"
  POSTGRES_USER: "honeypot"
  PGDATA: "/var/lib/postgresql/data/pgdata"
  # PostgreSQL tuning for production
  POSTGRES_MAX_CONNECTIONS: "200"
  POSTGRES_SHARED_BUFFERS: "512MB"
  POSTGRES_EFFECTIVE_CACHE_SIZE: "1536MB"
  POSTGRES_WORK_MEM: "16MB"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: honeypot
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
data:
  REDIS_MAXMEMORY: "400mb"
  REDIS_MAXMEMORY_POLICY: "allkeys-lru"
  REDIS_APPENDONLY: "yes"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: honeypot
  labels:
    app.kubernetes.io/name: nginx
    app.kubernetes.io/component: frontend
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;

    events {
        worker_connections 1024;
        use epoll;
        multi_accept on;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';

        access_log /var/log/nginx/access.log main;

        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        types_hash_max_size 2048;

        gzip on;
        gzip_vary on;
        gzip_proxied any;
        gzip_comp_level 6;
        gzip_types text/plain text/css text/xml application/json application/javascript 
                   application/xml application/xml+rss text/javascript;

        include /etc/nginx/conf.d/*.conf;
    }

  default.conf: |
    server {
        listen 3000;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;

        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location /api/ {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /ws {
            proxy_pass http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }