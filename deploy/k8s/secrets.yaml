# Kubernetes Secrets for Adaptive Honeypot System
# IMPORTANT: In production, use external secret management (Vault, AWS Secrets Manager, etc.)
# These are templates - replace placeholder values with actual secrets

---
apiVersion: v1
kind: Secret
metadata:
  name: honeypot-secrets
  namespace: honeypot
  labels:
    app.kubernetes.io/name: adaptive-honeypot
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  # Application secrets
  SECRET_KEY: "REPLACE_WITH_SECURE_SECRET_KEY_MIN_32_CHARS"
  JWT_SECRET: "REPLACE_WITH_SECURE_JWT_SECRET_MIN_32_CHARS"
  JWT_ALGORITHM: "HS256"
  JWT_EXPIRATION_HOURS: "24"
  
  # API Keys
  OPENAI_API_KEY: "REPLACE_WITH_OPENAI_API_KEY"
  ANTHROPIC_API_KEY: "REPLACE_WITH_ANTHROPIC_API_KEY"
  
  # Threat Intelligence API Keys
  VIRUSTOTAL_API_KEY: "REPLACE_WITH_VIRUSTOTAL_API_KEY"
  ABUSEIPDB_API_KEY: "REPLACE_WITH_ABUSEIPDB_API_KEY"
  
  # Alerting secrets
  SLACK_WEBHOOK_URL: "REPLACE_WITH_SLACK_WEBHOOK_URL"
  PAGERDUTY_ROUTING_KEY: "REPLACE_WITH_PAGERDUTY_ROUTING_KEY"
  SMTP_PASSWORD: "REPLACE_WITH_SMTP_PASSWORD"

---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: honeypot
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
type: Opaque
stringData:
  POSTGRES_USER: "honeypot"
  POSTGRES_PASSWORD: "REPLACE_WITH_SECURE_POSTGRES_PASSWORD"
  POSTGRES_DB: "adaptive_honeypot"
  # Connection string for applications
  DATABASE_URL: "postgresql://honeypot:REPLACE_WITH_SECURE_POSTGRES_PASSWORD@postgres:5432/adaptive_honeypot"

---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secrets
  namespace: honeypot
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/component: cache
type: Opaque
stringData:
  REDIS_PASSWORD: "REPLACE_WITH_SECURE_REDIS_PASSWORD"
  REDIS_URL: "redis://:REPLACE_WITH_SECURE_REDIS_PASSWORD@redis:6379/0"

---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secrets
  namespace: honeypot
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/component: monitoring
type: Opaque
stringData:
  GF_SECURITY_ADMIN_USER: "admin"
  GF_SECURITY_ADMIN_PASSWORD: "REPLACE_WITH_SECURE_GRAFANA_PASSWORD"
  GF_SECRET_KEY: "REPLACE_WITH_GRAFANA_SECRET_KEY"

---
apiVersion: v1
kind: Secret
metadata:
  name: tls-secrets
  namespace: honeypot
  labels:
    app.kubernetes.io/name: tls
    app.kubernetes.io/component: security
type: kubernetes.io/tls
data:
  # Base64 encoded TLS certificate and key
  # Use: kubectl create secret tls tls-secrets --cert=path/to/cert --key=path/to/key
  tls.crt: ""
  tls.key: ""

---
# Service Account for honeypot backend
apiVersion: v1
kind: ServiceAccount
metadata:
  name: honeypot-backend
  namespace: honeypot
  labels:
    app.kubernetes.io/name: adaptive-honeypot
automountServiceAccountToken: true

---
# ClusterRole for honeypot backend (to manage honeypot containers)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: honeypot-backend-role
  labels:
    app.kubernetes.io/name: adaptive-honeypot
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "pods/exec", "services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies", "ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: honeypot-backend-binding
  labels:
    app.kubernetes.io/name: adaptive-honeypot
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: honeypot-backend-role
subjects:
  - kind: ServiceAccount
    name: honeypot-backend
    namespace: honeypot