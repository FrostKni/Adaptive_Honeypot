# Grafana Dashboards for Adaptive Honeypot System
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: honeypot
  labels:
    app.kubernetes.io/name: grafana
    grafana_datasource: "1"
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
        jsonData:
          timeInterval: "15s"
          httpMethod: POST
      
      - name: Redis
        type: redis-datasource
        access: proxy
        url: redis://redis:6379
        isDefault: false
        editable: false
        jsonData:
          client: standalone
          poolSize: 5

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: honeypot
  labels:
    app.kubernetes.io/name: grafana
    grafana_dashboard: "1"
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /var/lib/grafana/dashboards

---
apiVersion: v1
